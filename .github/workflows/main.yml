name: CI - Paru_Gui (Arch Linux Container)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Update Pacman and install system dependencies for build and tests
      run: |
        # Inicializa e popula o keyring do pacman (resolve o erro da chave secreta)
        sudo pacman-key --init
        sudo pacman-key --populate archlinux
        sudo pacman-key --refresh-keys --noconfirm || true # Atualiza chaves, pode falhar mas não é crítico para o build

        # Atualiza o sistema no container Arch
        pacman -Syu --noconfirm
        
        # Instala as dependências, removendo 'python-mypy' e 'python-build' (que não são pacotes diretos no Arch)
        # e adicionando 'base-devel' para makepkg.
        pacman -S --noconfirm \
          base-devel python python-pip python-setuptools python-wheel \
          python-requests python-gobject \
          gtk4 libadwaita glib2 paru \
          bubblewrap dbus \
          meson ninja appstream-glib desktop-file-utils \
          python-black python-flake8 python-pytest \
          # 'python-mypy' não é um pacote pacman direto no Arch; será instalado via pip.
          # 'python-build' é um módulo python, também via pip.
        
        # Limpa o cache do pacman
        pacman -Scc --noconfirm || true

    - name: Install project (editable mode)
      # Este passo instala o seu projeto e suas dependências python (incluindo mypy e python-build)
      run: |
        pip install --upgrade pip
        # o `-e .` instala o seu projeto e as extras `[dev,test]`.
        # mypy e python-build são instalados aqui como dependências do seu pyproject.toml
        pip install -e ".[dev,test]" 

    - name: Run Black formatter check
      run: black --check src/ window.py 
      
    - name: Run Flake8 linter
      run: flake8 src/ window.py
      
    - name: Run MyPy type checker
      run: mypy src/ window.py

    - name: Configure Meson build
      run: meson setup build --prefix=/usr 
    
    - name: Compile project
      run: meson compile -C build

    - name: Run Meson tests (includes schema validation from data/meson.build)
      run: meson test -C build --print-errorlogs
      
    - name: Install project (dry run for verification)
      run: meson install -C build --dry-run
