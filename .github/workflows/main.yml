name: CI - Paru_Gui (Arch Linux Container)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pacman Keyring and Install System Dependencies
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        pacman-key --refresh-keys || true

        # Garante que o pacman não irá pedir confirmação
        yes | pacman -Syu --noconfirm

        yes | pacman -S --noconfirm \
          base-devel git python python-pip python-setuptools python-wheel \
          python-requests python-gobject \
          gtk4 libadwaita glib2 gobject-introspection \
          bubblewrap dbus \
          meson ninja appstream appstream-glib desktop-file-utils \
          python-black python-flake8 python-mypy python-pytest

        pacman -Scc --noconfirm || true

    - name: Install Paru (AUR helper)
      run: |
        cd /tmp
        git clone https://aur.archlinux.org/paru.git
        cd paru
        makepkg -si --noconfirm

    - name: Install Project and Python Dev Dependencies
      run: |
        pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Run Black formatter check
      run: black --check src/ window.py

    - name: Run Flake8 linter
      run: flake8 src/ window.py

    - name: Run MyPy type checker
      run: mypy src/ window.py

    - name: Configure Meson build
      run: meson setup build --prefix=/usr

    - name: Compile project
      run: meson compile -C build

    - name: Run Meson tests (includes schema validation from data/meson.build)
      run: meson test -C build --print-errorlogs

    - name: Install project (dry run for verification)
      run: meson install -C build --dry-run
