name: CI - Paru_Gui (Arch Linux Container) 

on:
  push:
    branches:
      - main 
  pull_request:
    branches:
      - main 

jobs:
  build:

    runs-on: ubuntu-latest
    

    container:
      image: archlinux:latest 
     
      options: --privileged 

    steps:
    - name: Checkout code

      uses: actions/checkout@v4

    - name: Setup Pacman Keyring and Install System Dependencies

      run: |
        # 1. Inicializa o keyring do Pacman. Essencial em ambientes novos para que o pacman funcione.
        sudo pacman-key --init
        # 2. Popula o keyring com as chaves oficiais do Arch Linux.
        sudo pacman-key --populate archlinux
        # 3. Atualiza as chaves. O '|| true' previne falhas se o keyserver não estiver acessível,
        #    mas as chaves populadas já devem ser suficientes para o build.
        sudo pacman-key --refresh-keys --noconfirm || true


        pacman -Syu --noconfirm
        
       
        pacman -S --noconfirm \
          base-devel python python-pip python-setuptools python-wheel \
          python-requests python-gobject \
          gtk4 libadwaita glib2 gobject-introspection paru \
          bubblewrap dbus \
          meson ninja appstream appstream-glib desktop-file-utils \
          python-black python-flake8 python-pytest
        

        pacman -Scc --noconfirm || true

    - name: Install Project and Python Dev Dependencies
      
      run: |
        pip install --upgrade pip # Garante que o pip esteja na versão mais recente
        pip install -e ".[dev,test]" # Instala seu projeto em modo editável com todas as extras

    - name: Run Black formatter check
      run: black --check src/ window.py 
      
    - name: Run Flake8 linter
      run: flake8 src/ window.py
      
    - name: Run MyPy type checker
      run: mypy src/ window.py

    - name: Configure Meson build
      run: meson setup build --prefix=/usr 
    
    - name: Compile project
      run: meson compile -C build

    - name: Run Meson tests (includes schema validation from data/meson.build)
      run: meson test -C build --print-errorlogs
      
    - name: Install project (dry run for verification)
      run: meson install -C build --dry-run
