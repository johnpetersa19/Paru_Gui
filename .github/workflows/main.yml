name: CI - Paru_Gui (Arch Linux Container)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Initialize Pacman Keyring
   
      run: |
        pacman-key --init
        pacman-key --populate archlinux
        pacman-key --refresh-keys || true # Removido '--noconfirm'

    - name: Update System and Install Base Dependencies

      run: |
        pacman -Syu --noconfirm # Atualiza o sistema
        
        # Instala dependências de sistema (não Python-específicas) e as que o paru precisa para compilar do AUR
        pacman -S --noconfirm \
          base-devel git \ # 'git' é essencial para clonar o paru, 'base-devel' para makepkg
          python python-pip python-setuptools python-wheel \
          python-requests python-gobject \
          gtk4 libadwaita glib2 gobject-introspection \
          bubblewrap dbus \
          meson ninja appstream appstream-glib desktop-file-utils \
          # As ferramentas Python de desenvolvimento (black, flake8, pytest) serão instaladas via pip
          # 'paru' foi REMOVIDO daqui, será instalado no próximo passo a partir do AUR.
        
        # Limpa o cache do pacman
        pacman -Scc --noconfirm || true

    - name: Install Paru (AUR helper)

      run: |
        # Garante que estamos no diretório certo antes de clonar.
        # O diretório de trabalho padrão é /home/runner/work/<repo>/<repo>
        cd /home/runner/work/Paru_Gui/Paru_Gui
        
        # Clona e compila o paru
        git clone https://aur.archlinux.org/paru.git /tmp/paru-build
        cd /tmp/paru-build
        makepkg -si --noconfirm
        
        # Volta para a raiz do seu repositório para os próximos passos
        cd /home/runner/work/Paru_Gui/Paru_Gui 

    - name: Install Project and Python Dev Dependencies
   
      run: |
        pip install --upgrade pip
        pip install -e ".[dev,test]" 

    - name: Run Black formatter check
      run: black --check src/ window.py 
      
    - name: Run Flake8 linter
      run: flake8 src/ window.py
      
    - name: Run MyPy type checker
      run: mypy src/ window.py

    - name: Configure Meson build
      run: meson setup build --prefix=/usr 
    
    - name: Compile project
      run: meson compile -C build

    - name: Run Meson tests (includes schema validation from data/meson.build)
      run: meson test -C build --print-errorlogs
      
    - name: Install project (dry run for verification)
      run: meson install -C build --dry-run
