name: CI - Paru_Gui

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: archlinux_latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies for build and tests
      run: |
        sudo pacman -Syu --noconfirm
        sudo pacman -S --noconfirm \
          python python-pip python-setuptools python-wheel \
          python-requests python-gobject \
          gtk4 libadwaita glib2 paru \
          bubblewrap dbus \
          meson ninja appstream-glib desktop-file-utils \
          black flake8 mypy python-pytest

    - name: Install project (editable+extras)
      run: |
        pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Run Black formatter check
      run: black --check src/ window.py

    - name: Run Flake8 linter
      run: flake8 src/ window.py

    - name: Run MyPy type checker
      run: mypy src/ window.py

    - name: Configure Meson build
      run: meson setup build --prefix=/usr

    - name: Compile project
      run: meson compile -C build

    - name: Run Meson tests (includes schema validation from data/meson.build)
      run: meson test -C build --print-errorlogs

    - name: Install project (dry run for verification)
      run: meson install -C build --dry-run
